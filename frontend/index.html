<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grace & Focus Planner</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 40px;
      max-width: 600px;
    }
    label {
      display: block;
      margin: 10px 0;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <h1>Grace & Focus Planner</h1>

  <form>
    <label>
      What is your one spiritual goal today?
      <textarea name="spiritual_goal" rows="2"></textarea>
    </label>

    <label>
      What is your one content task today?
      <textarea name="content_task" rows="2"></textarea>
    </label>

    <label>
      What is one distraction to avoid?
      <textarea name="avoid_distraction" rows="2"></textarea>
    </label>

    <button type="button" onclick="savePlan()">
      Save Plan
    </button>
  </form>

  <script>
    async function savePlan() {
      const data = {
        spiritual_goal: document.querySelector("[name='spiritual_goal']").value,
        content_task: document.querySelector("[name='content_task']").value,
        avoid_distraction: document.querySelector("[name='avoid_distraction']").value,
      };

      const res = await fetch("https://grace-and-focus-planner.onrender.com/planner/day", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });

      const result = await res.json();
      alert("Plan saved: " + result.status);
    }
  </script>
</body>
</html>
