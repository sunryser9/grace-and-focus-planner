<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grace & Focus Planner</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 40px;
      max-width: 600px;
    }
    label { display: block; margin: 10px 0; }
    input, textarea { width: 100%; padding: 8px; margin: 4px 0; }
  </style>
</head>
<body>
  <h1>Grace & Focus Planner</h1>

  <form>
    <label>
      What is your one spiritual goal today?
      <textarea name="spiritual_goal" rows="2"></textarea>
    </label>

    <label>
      What is your one content task today?
      <textarea name="content_task" rows="2"></textarea>
    </label>

    <label>
      What is one distraction to avoid?
      <textarea name="avoid_distraction" rows="2"></textarea>
    </label>

    <button type="button" onclick="alert('MVP frontend ready for backend!')">
      Save Plan (frontend only)
    </button>
  </form>
</body>
</html>
